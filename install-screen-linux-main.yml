
- name: Install package on Linux
  hosts: all
  become: true

  vars:
    package: ""

  tasks:
    - name: Install  package on Debian/Ubuntu
      apt:
        name: "{{ package }}"
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"


    - name: Install  package on RHEL/CentOS/Fedora
      package:
        name: '{{ package }}'
        state: present
      when: ansible_facts['os_family'] == "RedHat"