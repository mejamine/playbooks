- name: Install New Relic Infrastructure Agent (RHEL Family)
  hosts: rhel
  become: true
  vars:
    newrelic_license_key: ""
  tasks:

    - name: Create New Relic config file
      copy:
        dest: /etc/newrelic-infra.yml
        content: |
          license_key: {{ newrelic_license_key }}
        mode: '0644'

    - name: Add New Relic repository
      get_url:
        url: "https://download.newrelic.com/infrastructure_agent/linux/yum/el/{{ rhel_version }}/{{ rhel_arch }}/newrelic-infra.repo"
        dest: /etc/yum.repos.d/newrelic-infra.repo
        mode: '0644'

    - name: Refresh only newrelic-infra repository cache
      yum:
        update_cache: yes
        disablerepo: "*"
        enablerepo: "newrelic-infra"
    
    - name: Install libcap (required for privileged mode)
      yum:
        name: libcap
        state: present
      
    - name: Install newrelic-infra in privileged mode
      yum:
        name: newrelic-infra
        state: present
      environment:
        NRIA_MODE: "PRIVILEGED"


    - name: Enable and start service
      systemd:
        name: newrelic-infra
        state: started
        enabled: true
    
    - name: Restart New Relic after installation to see the machine in the newrelic UI
      systemd:
        name: newrelic-infra
        state: restarted