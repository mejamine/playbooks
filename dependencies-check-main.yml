---
- name: Check user activity on the system
  hosts: all
  become: true
  vars:
    target_user: "username_here"   

  tasks:

    - name: Check if user has running processes
      shell: "pgrep -u {{ target_user }}"
      register: user_processes
      ignore_errors: true

    - name: Display user processes
      debug:
        msg: "{{ target_user }} has running processes: {{ user_processes.stdout_lines | default([]) }}"

    - name: Check if user has running services
      shell: "systemctl list-units --type=service --all --no-legend | grep -i {{ target_user }}"
      register: user_services
      ignore_errors: true

    - name: Display user-owned services
      debug:
        msg: "{{ target_user }} has services: {{ user_services.stdout_lines | default([]) }}"
    - name: Find all files recursively
      find:
        paths: /
        recurse: yes
        file_type: any
      register: all_files
      ignore_errors: true

    - name: Filter files owned by the user
      set_fact:
        user_files: "{{ all_files.files | selectattr('pw_name', 'equalto', target_user) | list }}"
      ignore_errors: true

    - name: Display files owned by user
      debug:
        msg: "{{ target_user }} owns {{ user_files | length }} files. Sample: {{ user_files[:10] | map(attribute='path') | list }}"
