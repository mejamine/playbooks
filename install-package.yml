- name: Install package on Linux
  hosts: all
  become: true

  vars:
    package: ""          
    service_name: ""    

  tasks:
    - name: Install package on Debian/Ubuntu
      apt:
        name: "{{ package }}"
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install package on RHEL/CentOS/Fedora
      package:
        name: "{{ package }}"
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Start and enable service if service_name is defined
      systemd:
        name: "{{ service_name }}"
        state: started
        enabled: true
      when: service_name | length > 0