- name: Add Members to Groups
  hosts: all
  become: true

  vars:
    # Convert comma-separated strings into clean lists
    add_member_users: ""
    add_member_groups: ""

  tasks:

    - name: groups list
      ansible.builtin.set_fact:
        group_list: "{{ add_member_groups.split(',') }}"

    - name: users list
      ansible.builtin.set_fact:
        user_list: "{{ add_member_users.split(',') }}"

    - name: Get all system users
      ansible.builtin.getent:
        database: passwd
      register: all_users

    - name: Get all system groups
      ansible.builtin.getent:
        database: group
      register: all_groups

    - name: Identify missing users
      set_fact:
        missing_users: "{{ user_list | difference(all_users.ansible_facts.getent_passwd.keys() | list) }}"

    - name: Identify missing groups
      set_fact:
        missing_groups: "{{ group_list | difference(all_groups.ansible_facts.getent_group.keys() | list) }}"

    - name: Show missing users
      debug:
        msg: "These users do NOT exist: {{ missing_users }}"
      when: missing_users | length > 0

    - name: Show missing groups
      debug:
        msg: "These groups do NOT exist: {{ missing_groups }}"
      when: missing_groups | length > 0

    - name: Add valid users to valid groups
      ansible.builtin.user:
        name: "{{ item.0 }}"
        groups: "{{ item.1 }}"
        append: yes
      loop: "{{ user_list | product(group_list) | list }}"
      when:
        - item.0 in all_users.ansible_facts.getent_passwd
        - item.1 in all_groups.ansible_facts.getent_group
